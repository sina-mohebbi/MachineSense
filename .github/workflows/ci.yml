name: CI

on:
  push:
  pull_request:

jobs:
  ml:
    name: ML (lint + dataset-free tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt ruff
      - name: Lint
        run: ruff check .
      - name: Smoke tests (build model, train 1 step, int8 export)
        run: pytest -q

