# MachineSense cloud stack (Phase 3) -- self-hosted, $0, no credit card.
# ESP32 --MQTT/TLS--> EMQX --(rule engine + data bridge)--> TimescaleDB --> Grafana
#
#   docker compose up -d
#   EMQX dashboard : http://localhost:18083   (admin / public)
#   Grafana        : http://localhost:3000    (admin / admin)
#
# EMQX rule + TimescaleDB data-bridge are configured in Phase 3 (see cloud/README.md);
# they replace the custom Python proxy used in library-desk-sense.
services:
  emqx:
    image: emqx/emqx:5.8
    container_name: machinesense-emqx
    ports:
      - "1883:1883"     # MQTT
      - "8883:8883"     # MQTT over TLS
      - "18083:18083"   # dashboard
    volumes:
      - emqx-data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 12

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: machinesense-tsdb
    environment:
      POSTGRES_USER: machinesense
      POSTGRES_PASSWORD: machinesense
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"
    volumes:
      - tsdb-data:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  grafana:
    image: grafana/grafana:11.3.0
    container_name: machinesense-grafana
    depends_on: [timescaledb]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  emqx-data:
  tsdb-data:
  grafana-data:
